services:
  # 1. Elasticsearch (La base de données des logs)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Désactive la sécurité pour simplifier l'exercice local
      - "ES_JAVA_OPTS=-Xms1024m -Xmx1024m" # Limite la RAM 
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - app-network

  # 2. Logstash (Le tuyau qui reçoit et transforme les logs)
  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    command: -f /etc/logstash/conf.d/logstash.conf
    volumes:
      - ./misc/elk/logstash.conf:/etc/logstash/conf.d/logstash.conf
    ports:
      - "5000:5000"
    depends_on:
      - elasticsearch
    networks:
      - app-network

  # 3. Kibana (L'interface graphique)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - app-network

# On utilise le MEME réseau que ton application
networks:
  app-network:
    driver: bridge

volumes:
  es_data: